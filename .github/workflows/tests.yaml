name: Tests

on:
  push:
  pull_request:

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e .[dev]

      - name: Run tests
        # QT_QPA_PLATFORM=offscreen allows PyQt6 widgets to run without a
        # real display. main_test.py is excluded because it is a full GUI
        # integration test that drives QApplication.exec() and depends on
        # QtWebEngineCore (Chromium), which requires a GPU even in offscreen
        # mode and is not suitable for headless CI.
        env:
          QT_QPA_PLATFORM: offscreen
        run: python -m pytest aas_editor_test/ --ignore=aas_editor_test/main_test.py -v --tb=short
